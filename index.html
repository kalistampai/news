<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DISPATCH — Daily Intel Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanline" aria-hidden="true"></div>

  <header class="masthead">
    <div class="masthead__row">
      <h1 class="wordmark">DISPATCH<span class="wordmark__cursor">_</span></h1>
      <div class="masthead__meta">
        <span class="tag" id="statusTag">BOOTING</span>
        <span class="flag" id="archiveFlag" hidden>ARCHIVED</span>
        <span class="flag flag--new" id="newFlag" hidden>NEW BRIEFING</span>
        <time class="stamp" id="dateStamp">—</time>
      </div>
    </div>
    <p class="masthead__sub">Daily news aggregated and compiled · review <a href="https://github.com/kalistampai/news-aggregator/blob/main/pipeline/feeds.txt" target="_blank" rel="noopener noreferrer">news sources</a> to make updates</p>

    <div class="masthead__archive" id="archiveBar" hidden>
      <span class="archive__label">// log</span>
      <button class="archive__nav" id="prevDay" title="Older day" aria-label="Older day">◄</button>
      <span class="archive__select-wrap">
        <select class="archive__select" id="archiveSelect" aria-label="Select briefing date"></select>
      </span>
      <button class="archive__nav" id="nextDay" title="Newer day" aria-label="Newer day">►</button>
      <button class="archive__latest" id="latestBtn" title="Jump to latest">latest</button>
      <span class="archive__count" id="archiveCount"></span>
    </div>

    <div class="masthead__search" id="searchBar" hidden>
      <span class="search__label">// filter</span>
      <input type="search" class="search__input" id="searchInput"
             placeholder="Keyword search (title, source, reasoning, bullets)…"
             aria-label="Filter news items by keyword" autocomplete="off" spellcheck="false" />
      <button class="search__clear" id="searchClear" title="Clear filter (Esc)" hidden>clear</button>
      <span class="search__count" id="searchCount"></span>
    </div>

    <div class="masthead__controls" id="controlBar" hidden>
      <span class="ctl__label">// score</span>
      <input type="range" class="ctl__range" id="scoreRange" min="0" max="10" step="1" value="0"
             aria-label="Minimum relevance score" />
      <span class="ctl__value" id="scoreValue">all</span>
      <button class="ctl__btn" id="scoreReset" title="Reset score threshold" hidden>reset</button>

      <span class="ctl__sep" aria-hidden="true">|</span>

      <button class="ctl__btn" id="collapseAll" title="Collapse every category">collapse all</button>
      <button class="ctl__btn" id="expandAll" title="Expand every category">expand all</button>

      <span class="ctl__sep" aria-hidden="true">|</span>

      <label class="ctl__toggle">
        <input type="checkbox" id="autoRefresh" />
        <span>auto-refresh</span>
      </label>
      <select class="ctl__select" id="refreshEvery" aria-label="Auto-refresh interval">
        <option value="5">5m</option>
        <option value="15" selected>15m</option>
        <option value="30">30m</option>
        <option value="60">60m</option>
      </select>
      <button class="ctl__btn" id="refreshNow" title="Check the Gist for a new briefing now">refresh now</button>
      <span class="ctl__stamp" id="refreshStamp"></span>
    </div>

    <div class="masthead__stats" id="statBar" hidden>
      <span><b id="featCount">0</b> features</span>
      <span class="dot">·</span>
      <span><b id="notableCount">0</b> notable</span>
      <span class="dot">·</span>
      <span><b id="catCount">0</b> streams</span>
      <span class="dot">·</span>
      <span class="stamp" id="genStamp">—</span>
    </div>
  </header>

  <!-- Feed health: collapsed to one line; expands to the full source report. -->
  <section class="health" id="healthPanel" hidden>
    <button class="health__toggle" id="healthToggle" aria-expanded="false" aria-controls="healthBody">
      <span class="health__dot" id="healthDot" aria-hidden="true"></span>
      <span class="health__headline" id="healthHeadline">Feed health</span>
      <span class="health__delta" id="healthDeltaTag" hidden></span>
      <span class="health__chev" aria-hidden="true">▾</span>
    </button>
    <div class="health__body" id="healthBody" hidden>
      <div class="health__deltas" id="healthDeltas"></div>
      <div class="health__groups" id="healthGroups"></div>
      <p class="health__foot" id="healthFoot"></p>
    </div>
  </section>

  <!-- Source leaderboard: which feeds actually earn their place. -->
  <section class="health" id="boardPanel" hidden>
    <button class="health__toggle" id="boardToggle" aria-expanded="false" aria-controls="boardBody">
      <span class="health__dot" data-level="good" aria-hidden="true"></span>
      <span class="health__headline" id="boardHeadline">Source leaderboard</span>
      <span class="health__chev" aria-hidden="true">▾</span>
    </button>
    <div class="health__body" id="boardBody" hidden>
      <div class="lb__controls">
        <span class="ctl__label">// rank by</span>
        <button class="ctl__btn is-on" data-sort="features">features</button>
        <button class="ctl__btn" data-sort="avg">avg score</button>
        <button class="ctl__btn" data-sort="best">best score</button>
        <button class="ctl__btn" data-sort="total">total items</button>
        <span class="ctl__sep" aria-hidden="true">|</span>
        <label class="ctl__toggle">
          <input type="checkbox" id="lbAllDays" />
          <span>all archived days</span>
        </label>
      </div>
      <div class="lb__table" id="lbTable"></div>
      <p class="health__foot" id="lbFoot"></p>
    </div>
  </section>

  <!-- Diff view: what changed between two briefings. -->
  <section class="health" id="diffPanel" hidden>
    <button class="health__toggle" id="diffToggle" aria-expanded="false" aria-controls="diffBody">
      <span class="health__dot" id="diffDot" aria-hidden="true"></span>
      <span class="health__headline" id="diffHeadline">Diff view</span>
      <span class="health__chev" aria-hidden="true">▾</span>
    </button>
    <div class="health__body" id="diffBody" hidden>
      <div class="lb__controls">
        <span class="ctl__label">// compare</span>
        <span class="diff__base" id="diffBase">—</span>
        <span class="ctl__label">against</span>
        <span class="archive__select-wrap">
          <select class="archive__select" id="diffSelect" aria-label="Compare against date"></select>
        </span>
      </div>
      <div class="diff__grid" id="diffGrid"></div>
      <p class="health__foot" id="diffFoot"></p>
    </div>
  </section>

  <main id="board" class="board" aria-live="polite">
    <div class="state" id="loadingState">
      <div class="state__pulse"></div>
      <p>Fetching briefing…</p>
    </div>
  </main>

  <template id="cardTpl">
    <article class="card">
      <div class="card__rail"><div class="meter" aria-hidden="true"></div></div>
      <div class="card__body">
        <div class="card__head">
          <span class="card__src"></span>
          <span class="card__score"></span>
        </div>
        <h3 class="card__title"><a target="_blank" rel="noopener noreferrer"></a></h3>
        <p class="card__why"></p>
        <ul class="card__bullets"></ul>
        <a class="card__link" target="_blank" rel="noopener noreferrer">open source ↗</a>
      </div>
    </article>
  </template>

  <footer class="footer">
    <span id="footerNote">DISPATCH · static dashboard · data via GitHub Gist</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
